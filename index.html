<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Voxel Engine</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }

    #hotbar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    .slot {
      width: 50px;
      height: 50px;
      border: 3px solid #555;
      background: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-weight: bold;
      font-size: 20px;
    }

    .selected {
      border-color: yellow;
    }
  </style>
</head>
<body>

<div id="hotbar">
  <div class="slot selected" data-block="grass">G</div>
  <div class="slot" data-block="dirt">D</div>
  <div class="slot" data-block="stone">S</div>
  <div class="slot" data-block="wood">W</div>
</div>

<script type="module">
  import { startEngine } from './src/engine.js';
  startEngine();
</script>

</body>
</html>
